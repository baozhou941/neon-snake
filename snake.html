<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>霓虹吞噬蛇 · Neon Devourer</title>
<style>
  :root{
    --neon:#39f0c8; --neon2:#7c5cff; --pink:#ff4d9d; --bg:#05060f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
    color:#e8ecff;user-select:none;-webkit-user-select:none;
    touch-action:none;cursor:crosshair;
  }
  #screen{position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden;}
  #stage{position:fixed;inset:0;display:block;}

  /* ---------- HUD ---------- */
  .hud{position:fixed;inset:0;pointer-events:none;z-index:5;}
  .panel{
    position:absolute;background:rgba(10,14,30,.55);
    border:1px solid rgba(120,150,255,.18);border-radius:14px;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    box-shadow:0 8px 30px rgba(0,0,0,.45);
  }
  /* score top-left */
  #stats{top:14px;left:14px;padding:12px 16px;min-width:188px;}
  #stats .row{display:flex;justify-content:space-between;align-items:baseline;gap:18px;margin:3px 0;}
  #stats .lab{font-size:12px;letter-spacing:1px;color:#8da2d8;text-transform:uppercase;}
  #stats .val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;
    color:var(--neon);text-shadow:0 0 12px rgba(57,240,200,.6);}
  #stats .val.len{color:var(--pink);text-shadow:0 0 12px rgba(255,77,157,.6);}

  /* leaderboard top-right */
  #board{top:14px;right:14px;padding:12px 14px;width:208px;}
  #board h3{font-size:11px;letter-spacing:2px;color:#8da2d8;margin-bottom:8px;text-transform:uppercase;
    display:flex;align-items:center;gap:6px;}
  #board ol{list-style:none;}
  #board li{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;
    color:#c7d2ff;font-variant-numeric:tabular-nums;}
  #board li.me{color:var(--neon);font-weight:700;}
  #board li .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;}
  #board li .rk{color:#6b7bb0;width:18px;}

  /* minimap bottom-right */
  #mini{position:fixed;right:14px;bottom:14px;z-index:5;border-radius:50%;
    border:1px solid rgba(120,150,255,.22);background:rgba(8,11,24,.55);
    box-shadow:0 8px 30px rgba(0,0,0,.5);backdrop-filter:blur(4px);}

  /* boost bar bottom-center */
  #boostWrap{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
    width:240px;z-index:5;pointer-events:none;text-align:center;}
  #boostBar{height:8px;border-radius:6px;background:rgba(120,150,255,.15);overflow:hidden;
    border:1px solid rgba(120,150,255,.2);}
  #boostFill{height:100%;width:100%;border-radius:6px;
    background:linear-gradient(90deg,var(--neon),var(--neon2));
    box-shadow:0 0 14px rgba(57,240,200,.6);transition:width .08s linear;}
  #boostWrap .tip{font-size:11px;color:#7f8fc4;margin-top:6px;letter-spacing:1px;}

  /* ---------- Overlay menus ---------- */
  #overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:18px;text-align:center;
    background:radial-gradient(circle at 50% 35%,rgba(20,16,48,.78),rgba(5,6,15,.94));
    backdrop-filter:blur(3px);cursor:default;}
  #overlay.hidden{display:none;}
  .title{font-size:clamp(34px,7vw,68px);font-weight:800;letter-spacing:3px;line-height:1.05;
    background:linear-gradient(90deg,var(--neon),var(--neon2) 55%,var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 24px rgba(124,92,255,.45));}
  .sub{font-size:14px;color:#9fb0e0;letter-spacing:2px;}
  .card{padding:26px 30px;max-width:440px;}
  #nameInput{
    margin-top:4px;width:240px;padding:11px 14px;border-radius:10px;text-align:center;
    border:1px solid rgba(120,150,255,.3);background:rgba(10,14,30,.7);color:#eaf;
    font-size:15px;outline:none;letter-spacing:1px;
  }
  #nameInput:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(57,240,200,.18);}
  .lumenBar{font-size:13px;color:#cbd6ff;letter-spacing:1px;margin-top:2px;}
  .lumenBar b{color:#9fe8ff;font-size:16px;font-variant-numeric:tabular-nums;}
  .skins{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:2px;}
  .skinItem{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .skin{width:40px;height:40px;border-radius:50%;cursor:pointer;border:2px solid transparent;
    display:flex;align-items:center;justify-content:center;font-size:15px;
    transition:transform .12s,border-color .12s;}
  .skin:hover{transform:scale(1.12);}
  .skin.sel{border-color:#fff;transform:scale(1.12);box-shadow:0 0 16px rgba(255,255,255,.4);}
  .skin.locked{filter:grayscale(.35) brightness(.62);}
  .skinTag{font-size:10px;color:#9fb0e0;letter-spacing:.3px;}
  .skinTag.warn{color:#ff6b8a;font-weight:700;}
  .btn{pointer-events:auto;cursor:pointer;border:none;border-radius:12px;font-weight:700;
    padding:14px 40px;font-size:17px;letter-spacing:1px;color:#04101a;
    background:linear-gradient(90deg,var(--neon),var(--neon2));
    box-shadow:0 8px 28px rgba(57,240,200,.35);transition:transform .1s,box-shadow .2s;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(124,92,255,.5);}
  .btn:active{transform:translateY(0);}
  .help{font-size:13px;color:#8a9bd0;line-height:1.9;margin-top:6px;}
  .help b{color:var(--neon);font-weight:700;}
  .deathStat{display:flex;gap:34px;justify-content:center;margin:6px 0;}
  .deathStat div{font-size:13px;color:#9fb0e0;}
  .deathStat b{display:block;font-size:30px;color:var(--neon);
    text-shadow:0 0 14px rgba(57,240,200,.5);font-variant-numeric:tabular-nums;}
  .fps{position:fixed;left:14px;bottom:14px;font-size:11px;color:#46527e;z-index:5;font-variant-numeric:tabular-nums;}
  /* sound toggle */
  #soundBtn{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:6;
    width:44px;height:44px;border-radius:50%;cursor:pointer;pointer-events:auto;
    border:1px solid rgba(120,150,255,.25);background:rgba(10,14,30,.55);
    color:#cfe;font-size:19px;line-height:1;backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(0,0,0,.4);transition:transform .1s,background .2s;}
  #soundBtn:hover{transform:translateX(-50%) scale(1.08);background:rgba(20,28,60,.7);}
  #soundBtn.off{color:#6b7bb0;}
  /* high score panel (menu + death) */
  .hsBox{width:100%;max-width:340px;margin:2px auto 0;}
  .hsTitle{font-size:12px;letter-spacing:1px;color:#9fb0e0;margin-bottom:6px;}
  .hsList{list-style:none;text-align:left;}
  .hsList li{display:flex;align-items:center;gap:10px;padding:4px 10px;border-radius:8px;
    font-size:14px;color:#c7d2ff;font-variant-numeric:tabular-nums;}
  .hsList li:nth-child(odd){background:rgba(120,150,255,.06);}
  .hsList li.hsme{background:rgba(57,240,200,.16);color:#eafff8;font-weight:700;
    box-shadow:inset 0 0 0 1px rgba(57,240,200,.4);}
  .hsrk{width:20px;color:#7c5cff;font-weight:700;}
  .hsnm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .hssc{color:var(--neon);font-weight:700;}
  .hsme .hssc{color:#eafff8;}
  .hsEmpty{font-size:13px;color:#8a9bd0;padding:8px;}
  .record{color:#ffd24d;font-weight:800;letter-spacing:1px;
    text-shadow:0 0 16px rgba(255,210,77,.6);margin:2px 0;}
  .menuRow{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap;}
  .linkBtn{pointer-events:auto;cursor:pointer;background:none;border:none;color:#9fb0e0;
    font-size:14px;text-decoration:underline;text-underline-offset:3px;}
  .linkBtn:hover{color:var(--neon);}
  /* combo readout */
  #comboHud{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:6;
    pointer-events:none;text-align:center;font-weight:800;letter-spacing:1px;
    opacity:0;transition:opacity .15s;white-space:nowrap;}
  #comboHud.on{opacity:1;}
  #comboHud .cx{font-size:30px;color:#ffd24d;text-shadow:0 0 18px rgba(255,170,60,.8);}
  #comboHud .cm{font-size:13px;color:#ffe;opacity:.85;}
  /* touch boost button (hidden on desktop) */
  #boostBtn{display:none;position:fixed;right:22px;bottom:46px;z-index:6;
    width:104px;height:104px;border-radius:50%;cursor:pointer;
    flex-direction:column;align-items:center;justify-content:center;gap:2px;
    border:2px solid rgba(57,240,200,.5);color:#cffaf0;font-size:30px;line-height:1;
    background:radial-gradient(circle at 50% 38%,rgba(57,240,200,.34),rgba(10,18,34,.6));
    box-shadow:0 8px 26px rgba(0,0,0,.45),0 0 22px rgba(57,240,200,.25);
    -webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;}
  #boostBtn span{font-size:13px;letter-spacing:2px;font-weight:700;}
  #boostBtn:active{transform:scale(.94);background:radial-gradient(circle at 50% 38%,rgba(57,240,200,.6),rgba(10,18,34,.7));}
  body.touch #boostBtn{display:flex;}
  body.touch #boostTip{display:none;}
  body.touch #boostWrap{left:18px;right:auto;bottom:54px;transform:none;width:120px;}
  /* 手机端：显示小地图(右上,避开加速按钮)、隐藏排行榜腾空间 */
  body.touch #board{display:none;}
  body.touch #mini{display:block;top:12px;right:12px;bottom:auto;width:104px;height:104px;}
  /* 光谱进化 三选一 */
  #evolve{position:fixed;inset:0;z-index:18;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;text-align:center;
    background:radial-gradient(circle at 50% 40%,rgba(18,14,40,.86),rgba(4,5,13,.94));
    backdrop-filter:blur(3px);}
  #evolve.show{display:flex;}
  #evolve h2{font-size:clamp(24px,5vw,36px);font-weight:800;letter-spacing:3px;
    background:linear-gradient(90deg,#39f0c8,#7c5cff 55%,#ff4d9d);-webkit-background-clip:text;
    background-clip:text;color:transparent;filter:drop-shadow(0 0 18px rgba(124,92,255,.5));}
  #evolve .esub{font-size:13px;color:#9fb0e0;margin-top:-6px;letter-spacing:1px;}
  #evCards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:720px;padding:6px 14px;}
  .evCard{width:198px;min-height:156px;padding:18px 16px;border-radius:16px;cursor:pointer;
    background:rgba(12,16,32,.72);border:1.5px solid rgba(120,150,255,.25);
    display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;
    transition:transform .12s,border-color .12s,box-shadow .2s;pointer-events:auto;
    -webkit-tap-highlight-color:transparent;}
  .evCard:hover,.evCard:active{transform:translateY(-5px);}
  .evCard .eicon{font-size:36px;line-height:1;}
  .evCard .ename{font-size:18px;font-weight:800;}
  .evCard .edesc{font-size:13px;color:#aebbe6;line-height:1.55;}
  .evCard.g-red{border-color:rgba(255,90,130,.5);}
  .evCard.g-red:hover{box-shadow:0 0 26px rgba(255,77,157,.4);}
  .evCard.g-green{border-color:rgba(110,240,160,.5);}
  .evCard.g-green:hover{box-shadow:0 0 26px rgba(80,240,150,.4);}
  .evCard.g-blue{border-color:rgba(90,170,255,.5);}
  .evCard.g-blue:hover{box-shadow:0 0 26px rgba(77,175,255,.4);}
  .ename.g-red{color:#ff7da6;} .ename.g-green{color:#7df0a6;} .ename.g-blue{color:#7db8ff;}
  /* 事件横幅 */
  #eventBanner{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%) scale(.8);
    z-index:7;pointer-events:none;font-size:clamp(24px,5.5vw,48px);font-weight:900;
    letter-spacing:2px;opacity:0;text-align:center;text-shadow:0 0 24px currentColor;
    transition:opacity .3s,transform .3s;white-space:nowrap;}
  #eventBanner.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
  @media (max-width:560px){
    #board{display:none;}
    #stats{min-width:128px;padding:8px 11px;}
    #mini{display:none;}
    #comboHud{top:58px;}
    .evCard{width:150px;min-height:130px;padding:14px 10px;}
    .evCard .eicon{font-size:30px;} .evCard .ename{font-size:16px;} .evCard .edesc{font-size:12px;}
  }
</style>
</head>
<body>
<div id="screen">
<canvas id="stage"></canvas>

<!-- HUD -->
<div class="hud">
  <div id="stats" class="panel">
    <div class="row"><span class="lab">分数</span><span class="val" id="scoreV">0</span></div>
    <div class="row"><span class="lab">长度</span><span class="val len" id="lenV">10</span></div>
    <div class="row"><span class="lab">排名</span><span class="val" id="rankV">#1</span></div>
  </div>
  <div id="board" class="panel">
    <h3>⚡ 排行榜</h3>
    <ol id="boardList"></ol>
  </div>
</div>
<canvas id="mini" width="150" height="150"></canvas>
<div id="boostWrap">
  <div id="boostBar"><div id="boostFill"></div></div>
  <div class="tip" id="boostTip">按住 鼠标 / 空格 加速冲刺</div>
</div>
<div id="comboHud"></div>
<button id="boostBtn" aria-label="加速冲刺">⚡<span>加速</span></button>
<div class="fps" id="fps"></div>
<button id="soundBtn" title="音效 / 音乐开关">🔊</button>

<!-- 动态事件横幅 -->
<div id="eventBanner"></div>

<!-- 光谱进化：三选一 -->
<div id="evolve">
  <h2>光谱进化</h2>
  <div class="esub">选择一项变异 · 强化你的吞噬之道</div>
  <div id="evCards"></div>
</div>

<!-- Menu / Death overlay -->
<div id="overlay">
  <div class="card panel" id="card">
    <div class="title">霓虹吞噬蛇</div>
    <div class="sub" id="subTitle">NEON&nbsp;·&nbsp;DEVOURER</div>
    <input id="nameInput" maxlength="12" placeholder="给你的蛇起个名字" />
    <div class="skins" id="skins"></div>
    <button class="btn" id="playBtn">开 始 吞 噬</button>
    <div class="help">
      <b>移动</b> 跟随鼠标 / 手指 &nbsp;·&nbsp; <b>冲刺</b> 按住左键 / 空格<br>
      吞光球变长变粗，撞击其他蛇头让它爆成光点再吃掉它
    </div>
  </div>
</div>
</div><!-- /#screen -->

<script>
"use strict";
/* ===========================================================
   霓虹吞噬蛇 — 原创单文件小游戏
   连续移动 / 鼠标控制 / 吞噬成长 / AI 对手 / 霓虹粒子
   =========================================================== */

// ---------- canvas & DPR ----------
const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
const mini = document.getElementById('mini');
const mctx = mini.getContext('2d');
const IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints>0)
              || window.matchMedia('(pointer:coarse)').matches;
let DPR = 1, VW = 0, VH = 0;
let rot = false;                       // 是否强制旋转成横屏（微信/竖屏锁定时）

function resize(){
  // 手机降采样以保性能（含加速时的流畅度）
  DPR = Math.min(window.devicePixelRatio || 1, IS_TOUCH ? 1.5 : 2);
  if(rot){ VW = window.innerHeight; VH = window.innerWidth; }
  else   { VW = window.innerWidth;  VH = window.innerHeight; }
  cv.width = VW * DPR; cv.height = VH * DPR;
  cv.style.width = VW + 'px'; cv.style.height = VH + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}

// 触屏竖屏时，用 CSS 把整个游戏旋转成横屏（不依赖系统/微信旋转）
function applyOrientation(){
  const portrait = window.innerHeight > window.innerWidth;
  rot = IS_TOUCH && portrait;
  const sc = document.getElementById('screen');
  if(sc){
    if(rot){
      const W=window.innerWidth, H=window.innerHeight;
      sc.style.width=H+'px'; sc.style.height=W+'px';
      sc.style.transformOrigin='0 0';
      sc.style.transform='translateX('+W+'px) rotate(90deg)';
    } else {
      sc.style.width=''; sc.style.height='';
      sc.style.transform=''; sc.style.transformOrigin='';
    }
  }
  resize();
}
// 把屏幕坐标(clientX/Y)换算到游戏坐标（旋转时需变换）
function evToGame(cx,cy){
  return rot ? {x:cy, y:window.innerWidth-cx} : {x:cx, y:cy};
}
window.addEventListener('resize', applyOrientation);
window.addEventListener('orientationchange', ()=>setTimeout(applyOrientation,150));
applyOrientation();

// ---------- world ----------
const WORLD_R = 2600;            // 圆形竞技场半径
const SEG_SPACING = 4.2;         // 身体采样点间距
const BASE_SPEED = 2.45;
const BOOST_SPEED = 4.7;
const TURN_RATE = 0.115;         // 玩家最大转向（弧度/帧）
const ORB_TARGET = 380;          // 场上光球目标数量
const BOT_TARGET = 16;           // AI 数量（更热闹的对战）
const MAX_SEG = 200;             // 蛇身渲染段数硬上限（防止超长卡顿）

const SKINS = [
  ['#39f0c8','#1f8f7e'], ['#7c5cff','#3a2a8f'], ['#ff4d9d','#a3206b'],
  ['#ffd24d','#c98a14'], ['#4dafff','#1f5fb0'], ['#8aff5c','#3f9e2c'],
  ['#7defff','#1c7fae'], ['#ff7a3d','#a8331a'], ['#5cf0c8','#6a4cff'], ['#d7e0ff','#27306a'],
];
// 皮肤元信息：前 6 个免费，其余用光尘解锁
const SKIN_INFO = [
  {name:'翡翠',cost:0},{name:'紫电',cost:0},{name:'品红',cost:0},
  {name:'流金',cost:0},{name:'湛蓝',cost:0},{name:'青柠',cost:0},
  {name:'冰晶',cost:150},{name:'熔岩',cost:280},{name:'极光',cost:450},{name:'暗物质',cost:700},
];
const BOT_NAMES = ['蚀光','虚空','霓裂','猎食者','流星','黯','幽蛇','炽','棱镜','深渊','银河','残响','噬','暮','离子'];

// ---------- helpers ----------
const TAU = Math.PI*2;
const rand=(a,b)=>a+Math.random()*(b-a);
const randInt=(a,b)=>Math.floor(rand(a,b+1));
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
function angTo(a,b){ // 把 a 朝 b 旋转最短方向，返回差值 [-PI,PI]
  let d=(b-a)%TAU; if(d>Math.PI)d-=TAU; if(d<-Math.PI)d+=TAU; return d;
}
function hexRGBA(hex,a){
  const n=parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

// length(score) -> radius of snake body
function radiusFor(len){ return 7 + Math.min(26, Math.pow(len,0.46)*1.05); }
// 渲染段数：随长度增长但封顶在 MAX_SEG —— 解决"越长越卡"
function segCountFor(len){ return Math.round(clamp(10 + len*0.55, 10, MAX_SEG)); }
// 采样间距：体型越大间距越大，让"段数封顶"的蛇依然很长
function spacingFor(len){ return SEG_SPACING * clamp(1 + (len-120)/1200, 1, 3.2); }

// ===========================================================
//  Snake
// ===========================================================
class Snake{
  constructor(opts){
    this.name = opts.name;
    this.isPlayer = !!opts.isPlayer;
    this.skin = opts.skin;
    this.color = this.skin[0];
    this.dark = this.skin[1];
    this.x = opts.x; this.y = opts.y;
    this.angle = rand(0,TAU);
    this.len = opts.len || 10;
    this.speed = BASE_SPEED;
    this.boosting = false;
    this.dead = false;
    this.pts = [];               // 身体采样点 (头在 [0])
    const c=Math.cos(this.angle), s=Math.sin(this.angle), sp0=spacingFor(this.len);
    for(let i=0;i<segCountFor(this.len);i++)
      this.pts.push({x:this.x - c*i*sp0, y:this.y - s*i*sp0});
    this._acc=0;
    // AI state
    this.aiTurn = 0;
    this.aiTimer = rand(20,80);
    this.aiTarget = null;
    this.boostFuel = 1;          // 0..1 用于玩家冲刺耗能
    this.mods = defaultMods();   // 光谱进化修正（仅玩家会改）
    this.mutLevel = 0;           // 已触发的里程碑数
  }
  get radius(){ return radiusFor(this.len); }
  get head(){ return this.pts[0]; }
  get score(){ return Math.floor(this.len*10 - 100); }

  setAngleToward(targetAngle, maxTurn){
    const d = angTo(this.angle, targetAngle);
    this.angle += clamp(d, -maxTurn, maxTurn);
  }

  update(){
    if(this.dead) return;
    // speed (含进化修正)
    let base = this.boosting ? BOOST_SPEED*this.mods.boostSpeed : BASE_SPEED;
    let sp = base * this.mods.speed;
    this.speed = sp;
    // move head
    this.x += Math.cos(this.angle)*sp;
    this.y += Math.sin(this.angle)*sp;

    // sample body points at size-scaled spacing
    const space = spacingFor(this.len);
    this._acc += sp;
    while(this._acc >= space){
      this._acc -= space;
      this.pts.unshift({x:this.x, y:this.y});
      const want = segCountFor(this.len);
      while(this.pts.length > want) this.pts.pop();
    }
    // keep head fresh
    this.pts[0] = {x:this.x, y:this.y};
  }

  // 撞墙 (动态圆形边界)
  outOfBounds(){
    return Math.hypot(this.x,this.y) > arenaR - this.radius*0.4;
  }
}

function startEvent(kind){

    banner('☄ 超新星爆发 · 中心能量喷涌','#ffd24d');
    for(let i=0;i<90;i++){ const p=randDisc(380); spawnOrb(p.x,p.y, randInt(4,9)); }

  } else {

    ev.phase='void'; ev.t=0;
  }
  ev.lastKind=kind;
}
function updateEvents(){
  if(ev.phase==='idle'){
    if(--ev.timer<=0) startEvent(ev.lastKind==='nova'?'void':'nova');
    return;
  }
  if(ev.phase==='void'){
    ev.t++;
    const dur=960;                     // ~16s
    const k=ev.t/dur;
    if(k>=1){ arenaR=WORLD_R; ev.phase='idle'; ev.timer=2200; }
    else {
      let f; if(k<0.35) f=k/0.35; else if(k<0.65) f=1; else f=1-(k-0.65)/0.35;
      arenaR=lerp(WORLD_R, WORLD_R*0.6, f);   // 收缩 → 保持 → 恢复
    }
  }
}

// ===========================================================
//  Audio — 纯合成音效 / 背景音乐 (Web Audio, 无外部文件)
// ===========================================================
const Sound = (function(){
  let actx=null, master=null, musicGain=null, sfxGain=null;
  let muted = localStorage.getItem('neon_snake_muted')==='1';
  let musicTimer=null, step=0;
  let boostOsc=null, boostG=null, lastEat=0, eatStep=0;

  function init(){
    if(actx){ if(actx.state==='suspended') actx.resume(); return; }
    const AC = window.AudioContext||window.webkitAudioContext;
    if(!AC) return;
    actx = new AC();
    master = actx.createGain();  master.gain.value = muted?0:0.85;  master.connect(actx.destination);
    musicGain = actx.createGain(); musicGain.gain.value = 0.30; musicGain.connect(master);
    sfxGain = actx.createGain();   sfxGain.gain.value = 0.55;  sfxGain.connect(master);
  }
  function tone(freq,dur,type,gain,dst){
    if(!actx) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.connect(dst||sfxGain); o.connect(g);
    const t=actx.currentTime;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(gain||0.3, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.start(t); o.stop(t+dur+0.03);
  }
  // ---- SFX ----
  function eat(){
    if(!actx) return;
    const now=actx.currentTime;
    if(now-lastEat<0.4) eatStep=Math.min(eatStep+1,14); else eatStep=0;
    lastEat=now;
    const f=460*Math.pow(2,eatStep/12);     // 连吃音阶上行，越吃越爽
    tone(f,0.12,'triangle',0.22);
    tone(f*2,0.07,'sine',0.08);
  }
  function kill(){
    if(!actx) return;
    tone(200,0.22,'sawtooth',0.30);
    tone(300,0.18,'square',0.16);
    setTimeout(()=>tone(130,0.3,'sawtooth',0.22),70);
  }
  function die(){
    if(!actx) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type='sawtooth'; o.connect(g); g.connect(sfxGain);
    const t=actx.currentTime;
    o.frequency.setValueAtTime(480,t);
    o.frequency.exponentialRampToValueAtTime(55,t+0.7);
    g.gain.setValueAtTime(0.35,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.85);
    o.start(t); o.stop(t+0.9);
  }
  function boostOn(){
    if(!actx||boostOsc) return;
    boostOsc=actx.createOscillator(); boostG=actx.createGain();
    boostOsc.type='sawtooth'; boostOsc.frequency.value=70;
    boostG.gain.value=0.0001; boostG.connect(sfxGain); boostOsc.connect(boostG);
    boostG.gain.exponentialRampToValueAtTime(0.07, actx.currentTime+0.06);
    boostOsc.start();
  }
  function boostOff(){
    if(!boostOsc) return;
    const t=actx.currentTime;
    boostG.gain.exponentialRampToValueAtTime(0.0001,t+0.1);
    boostOsc.stop(t+0.12); boostOsc=null;
  }
  // ---- procedural background music ----
  const SCALE=[0,3,5,7,10];            // 小调五声
  const ROOT=220, PROG=[0,-2,3,-4];    // 和弦进行(半音位移)
  function nf(semi){ return ROOT*Math.pow(2,semi/12); }
  function beat(){
    if(!actx||muted) return;
    const idx=step%8;
    const chord=PROG[Math.floor(step/8)%PROG.length];
    const semi=chord + SCALE[idx%SCALE.length] + (idx>=5?12:0);
    tone(nf(semi),0.26,'triangle',0.10,musicGain);   // 主旋律琶音
    if(idx%4===0) tone(nf(chord-12),0.45,'sine',0.16,musicGain); // 低音
    if(idx%2===1) tone(nf(semi+12),0.12,'sine',0.045,musicGain); // 高音点缀
    step++;
  }
  function levelup(){
    if(!actx) return;
    tone(523,0.13,'triangle',0.20);
    setTimeout(()=>tone(659,0.13,'triangle',0.20),90);
    setTimeout(()=>tone(784,0.20,'triangle',0.22),180);
  }
  function startMusic(){ if(!actx) return; stopMusic(); step=0; musicTimer=setInterval(beat,205); }
  function stopMusic(){ if(musicTimer){clearInterval(musicTimer); musicTimer=null;} }
  function setMuted(m){
    muted=m; localStorage.setItem('neon_snake_muted', m?'1':'0');
    if(master) master.gain.value = m?0:0.85;
  }
  return {init,eat,kill,die,boostOn,boostOff,levelup,startMusic,stopMusic,setMuted,
          get muted(){return muted;}};
})();

const LM_KEY='neon_snake_lumen', SK_KEY='neon_snake_skins';
function getLumen(){ return Math.max(0, Math.floor(+(localStorage.getItem(LM_KEY)||0))); }
function addLumen(n){ try{ localStorage.setItem(LM_KEY, getLumen()+Math.floor(n)); }catch(e){} }
function spendLumen(n){ const v=getLumen(); if(v<n) return false; try{ localStorage.setItem(LM_KEY, v-n); }catch(e){} return true; }
function unlockedSkins(){ try{ return new Set(JSON.parse(localStorage.getItem(SK_KEY)||'[]')); }catch(e){ return new Set(); } }
function skinUnlocked(i){ return SKIN_INFO[i].cost===0 || unlockedSkins().has(i); }
function unlockSkinSave(i){ const s=unlockedSkins(); s.add(i); try{ localStorage.setItem(SK_KEY,JSON.stringify([...s])); }catch(e){} }

const HS_KEY='neon_snake_scores';
function loadScores(){ try{ return JSON.parse(localStorage.getItem(HS_KEY)||'[]'); }catch(e){ return []; } }
function saveScore(entry){
  const list=loadScores(); list.push(entry);
  list.sort((a,b)=>b.score-a.score);
  const top=list.slice(0,10);
  try{ localStorage.setItem(HS_KEY,JSON.stringify(top)); }catch(e){}
  return top.some(e=>e.ts===entry.ts) ? top.findIndex(e=>e.ts===entry.ts) : -1;
}
function esc(s){ return String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
function scoresHTML(highlightTs){
  const list=loadScores();
  if(!list.length) return '<div class="hsTitle">🏆 本机最高分</div><div class="hsEmpty">还没有记录——吃光球，做第一个上榜的人！</div>';
  let h='<div class="hsTitle">🏆 本机最高分</div><ol class="hsList">';
  list.forEach((e,i)=>{
    const me = highlightTs && e.ts===highlightTs ? ' class="hsme"':'';
    h+=`<li${me}><span class="hsrk">${i+1}</span><span class="hsnm">${esc(e.name)}</span><span class="hssc">${e.score}</span></li>`;
  });
  return h+'</ol>';
}

  running=false;
  // player body already scattered + burst in killSnake(); add a final flourish
  burst(player.x,player.y,player.color,40,6);
  if(player._sfxBoost){ Sound.boostOff(); player._sfxBoost=false; }
  Sound.die(); Sound.stopMusic();

  const finalScore=Math.max(0,player.score)+bonusScore;
  const entry={name:(playerName||'玩家'),score:finalScore,len:Math.floor(player.len),
               kills,ts:Date.now()};
  const rank=saveScore(entry);          // 存档；rank=榜内名次(0起)，-1 未上榜
  const onBoard = rank>=0;
  const recordLine = rank===0 ? '<div class="record">★ 新纪录 · 本机最高分 ★</div>'
                  : onBoard ? `<div class="record" style="color:#39f0c8;text-shadow:0 0 14px rgba(57,240,200,.5)">上榜啦 · 第 ${rank+1} 名</div>`
                  : '';

  const earned = Math.floor(finalScore/40) + kills*6;
  addLumen(earned);
  card.innerHTML=`

}

// turn a dead snake's body into orbs —— 向外迸射 + 短暂不可拾取，避免被瞬间吸收看不见
function scatterSnake(s){
  const n = clamp(Math.round(s.len*0.55), 6, 90);   // 球数随体型，但封顶
  const val = clamp(3 + Math.floor(s.len/120), 4, 12);
  for(let i=0;i<n;i++){
    const p = s.pts[Math.min(s.pts.length-1, Math.floor(i/n*s.pts.length))] || s.head;
    const a = rand(0,TAU), v = rand(1.6,4.2);
    spawnOrb(p.x+rand(-5,5), p.y+rand(-5,5), val, s.color,
             Math.cos(a)*v, Math.sin(a)*v, randInt(12,20));
  }
}

const BASE_ZOOM = IS_TOUCH ? 0.72 : 0.9;   // 拉远相机扩大视野(手机更明显)
let edgeBoost=false;                        // 摇杆推到底=加速(单指可玩)

// ---- desktop: mouse steers, hold = boost ----
function setPointer(e){ const p=evToGame(e.clientX,e.clientY); pointer.x=p.x; pointer.y=p.y; pointer.active=true; }
cv.addEventListener('mousemove',setPointer);
cv.addEventListener('mousedown',e=>{ if(e.button===0){ boostHeld=true; setPointer(e); } });
window.addEventListener('mouseup',()=>boostHeld=false);
window.addEventListener('keydown',e=>{ if(e.code==='Space'){ e.preventDefault(); boostHeld=true; } });
window.addEventListener('keyup',e=>{ if(e.code==='Space') boostHeld=false; });

// ---- touch: 左手浮动摇杆控方向，右下独立加速按钮（坐标经旋转变换）----
let steerId=null, steerOX=0, steerOY=0, steerKX=0, steerKY=0;
cv.addEventListener('touchstart',e=>{
  for(const t of e.changedTouches){
    if(steerId===null){
      steerId=t.identifier; const g=evToGame(t.clientX,t.clientY);
      steerOX=steerKX=g.x; steerOY=steerKY=g.y; touchSteer=true;
    }
  }
  e.preventDefault();
},{passive:false});
cv.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===steerId){
      const g=evToGame(t.clientX,t.clientY); steerKX=g.x; steerKY=g.y;
      const dx=steerKX-steerOX, dy=steerKY-steerOY, d2=dx*dx+dy*dy;
      if(d2>20) touchHeading=Math.atan2(dy,dx);
      edgeBoost = d2 > 78*78;        // 推到底自动冲刺
    }
  }
  e.preventDefault();
},{passive:false});
function endSteer(e){
  for(const t of e.changedTouches){ if(t.identifier===steerId){ steerId=null; touchSteer=false; edgeBoost=false; } }
}
cv.addEventListener('touchend',endSteer);
cv.addEventListener('touchcancel',endSteer);

// ===========================================================
//  AI
// ===========================================================
// 找最近光球(抽样)
function nearestOrb(s){
  let best=null,bd=1e9;
  for(let k=0;k<orbs.length;k+=7){
    const o=orbs[k]; if(o.delay>0) continue;
    const d=(o.x-s.x)**2+(o.y-s.y)**2;
    if(d<bd){bd=d;best=o;}
  }
  return best;
}
// 找最近的其他蛇(可偏好玩家)
function nearestPrey(s,preferPlayer){
  let best=null,bd=1e9;
  for(const o of snakes){
    if(o===s||o.dead) continue;
    let d=(o.x-s.x)**2+(o.y-s.y)**2;
    if(preferPlayer && o.isPlayer) d*=0.45;   // 更想猎杀玩家
    if(d<bd){bd=d;best=o;}
  }
  return best;
}

function updateBotAI(s){
  s.aiTimer--;
  const toCenter=Math.hypot(s.x,s.y);
  let desired=s.angle;
  let wantBoost=false;
  const persona=s.persona||'roamer';

  if(toCenter > arenaR*0.80){
    // 边界回避优先（虚空收缩时也适用）
    desired=Math.atan2(-s.y,-s.x);
  } else if(persona==='hunter'){
    // 猎手：抢到猎物前方,逼它撞上自己身体
    const prey=nearestPrey(s,true);
    if(prey){
      const dist=Math.hypot(prey.x-s.x, prey.y-s.y);
      const lead=clamp(dist*0.25, 20, 240);
      const tx=prey.x+Math.cos(prey.angle)*lead;
      const ty=prey.y+Math.sin(prey.angle)*lead;
      desired=Math.atan2(ty-s.y, tx-s.x);
      if(dist<260 && s.len>16 && Math.random()<0.04+aggression*0.08) wantBoost=true;
    } else { const o=nearestOrb(s); if(o) desired=Math.atan2(o.y-s.y,o.x-s.x); }
  } else if(persona==='ambusher'){
    // 伏击者：平时吃球,有蛇接近就切到它前方
    const prey=nearestPrey(s,false);
    const dist=prey?Math.hypot(prey.x-s.x,prey.y-s.y):1e9;
    if(prey && dist<300){
      const tx=prey.x+Math.cos(prey.angle)*120, ty=prey.y+Math.sin(prey.angle)*120;
      desired=Math.atan2(ty-s.y,tx-s.x);
      if(dist<180 && s.len>18 && Math.random()<0.05) wantBoost=true;
    } else {
      if(s.aiTimer<=0||!s.aiTarget){ s.aiTimer=rand(30,90); s.aiTarget=nearestOrb(s); }
      if(s.aiTarget) desired=Math.atan2(s.aiTarget.y-s.y,s.aiTarget.x-s.x);
    }
  } else {
    // farmer / roamer：吃球
    if(s.aiTimer<=0||!s.aiTarget){ s.aiTimer=rand(30,90); s.aiTarget=nearestOrb(s); }
    if(s.aiTarget) desired=Math.atan2(s.aiTarget.y-s.y,s.aiTarget.x-s.x);
  }

  // 躲避其他蛇身体（hunter 较莽，farmer 最怂）
  const avoidR = persona==='farmer'?190 : persona==='hunter'?95 : 130;
  const avoidW = persona==='farmer'?0.95 : persona==='hunter'?0.55 : 0.8;
  for(const o of snakes){
    if(o===s||o.dead) continue;
    const dist=Math.hypot(o.x-s.x, o.y-s.y);
    if(dist < avoidR && dist>0.1){
      const away=Math.atan2(s.y-o.y, s.x-o.x);
      desired=lerp(desired, away, clamp((avoidR-dist)/avoidR,0,1)*avoidW);
    }
  }

  // boost
  s.boosting=false;
  if(wantBoost && s.len>13) s._boostUntil=frame+randInt(16,40);
  else if(s.len>15 && Math.random()<0.003) s._boostUntil=frame+randInt(18,40);
  if(s._boostUntil && frame<s._boostUntil && s.len>12){ s.boosting=true; s.len-=0.04; }

  s.setAngleToward(desired, TURN_RATE*0.92);
}

// 动态导演：按玩家强弱调整侵略性
function updateDirector(){
  if(!player||player.dead) return;
  if(frame%90!==0) return;
  const ranked=[...snakes].sort((a,b)=>b.len-a.len);
  const top1 = ranked.indexOf(player)===0;
  let target = 0.22 + (top1?0.35:0) + clamp((player.len-160)/900,0,0.35);
  aggression = lerp(aggression, clamp(target,0.12,0.92), 1);
}

// ===========================================================
//  Collisions
// ===========================================================
function eatOrbs(s){
  const r=s.radius + 6;
  const r2=r*r;
  const mag = s.mods.magnet;
  const magR = r + 90*mag;
  const magR2 = magR*magR;
  for(let i=orbs.length-1;i>=0;i--){
    const o=orbs[i];
    if(o.delay>0) continue;                 // 刚迸射的球短暂不可吃，先飞出去
    const dx=o.x-s.x, dy=o.y-s.y;
    const d2=dx*dx+dy*dy;
    if(d2 < r2){
      s.len += o.val*0.6*s.mods.lenGain;
      if(s.isPlayer){
        burst(o.x,o.y,o.color,o.val>=5?10:4,o.val>=5?3:1.8);
        Sound.eat();
        // ---- 吞噬连击 ----
        combo++; comboTimer=Math.round(70*s.mods.comboWindow);
        bonusScore += Math.max(1, Math.round(o.val * Math.min(combo,40) * 0.45 * s.mods.comboBoost));
      }
      orbs.splice(i,1);
    } else if(d2 < magR2){
      // 磁吸：靠近的球被吸过来
      const d=Math.sqrt(d2)||1;
      const pull=clamp((magR*2-d)/(magR*2),0,1)*2.4;
      o.x -= (dx/d)*pull; o.y -= (dy/d)*pull;
    }
  }
}

// head-to-body collision: returns the snake we crashed into, or null
function checkCrash(s){
  if(s.outOfBounds()) return {wall:true};
  const hx=s.x, hy=s.y, hr=s.radius*s.mods.hit;
  for(const o of snakes){
    if(o===s||o.dead) continue;
    const br=o.radius;
    const hit=(hr+br)*0.86; const hit2=hit*hit;
    // 跳过靠近头部的几个点（避免与对方头并行时误判过敏），从第2点起
    for(let i=2;i<o.pts.length;i+=2){
      const p=o.pts[i];
      const dx=p.x-hx, dy=p.y-hy;
      if(dx*dx+dy*dy < hit2) return o;
    }
  }
  return null;
}

function killSnake(s,by){
  if(s.dead) return;
  s.dead=true;
  scatterSnake(s);
  burst(s.x,s.y,s.color,40,5);
  if(by && by.isPlayer){
    kills++; Sound.kill(); shake=Math.max(shake,8); freeze=5;
    if(by.mods.thorns>0) by.len += 5*by.mods.thorns;   // 棘刺：击杀额外吞噬奖励
  }
}

// ===========================================================
//  Main loop
// ===========================================================
let last=performance.now(), fps=60, fpsAcc=0, fpsN=0;
const fpsEl=document.getElementById('fps');

function loop(now){
  const dt=now-last; last=now;
  fpsAcc+=dt; fpsN++;
  if(fpsAcc>500){ fps=Math.round(1000/(fpsAcc/fpsN)); fpsAcc=0;fpsN=0; fpsEl.textContent=fps+' FPS'; }

  // freeze=击杀顿帧, paused=进化选择
  if(running && !paused){ if(freeze>0) freeze--; else tick(); }
  render();
  requestAnimationFrame(loop);
}

function tick(){
  frame++;
  // ----- player control -----
  if(player && !player.dead){
    // 方向：触屏摇杆优先，否则鼠标指针
    let targetAng;
    if(touchSteer){
      targetAng = touchHeading;
    } else {
      const worldPX = camX + (pointer.x - VW/2)/camScale;
      const worldPY = camY + (pointer.y - VH/2)/camScale;
      targetAng = Math.atan2(worldPY-player.y, worldPX-player.x);
    }
    player.setAngleToward(targetAng, TURN_RATE*player.mods.turn);

    // boost (costs length + fuel) —— 按钮/空格/左键 或 摇杆推到底
    const canBoost = (boostHeld||edgeBoost) && player.len>12 && player.boostFuel>0.04;
    player.boosting = canBoost;
    if(canBoost){
      player.len -= 0.06*player.mods.boostCost;
      player.boostFuel = clamp(player.boostFuel - 0.012*player.mods.boostCost, 0, 1);
      // drop a small orb trail (节流以保流畅)
      if(frame%7===0){
        const tx=player.x-Math.cos(player.angle)*player.radius;
        const ty=player.y-Math.sin(player.angle)*player.radius;
        spawnOrb(tx,ty,1,player.color);
        if(!IS_TOUCH) burst(tx,ty,player.color,2,1.4);
      }
    } else {
      player.boostFuel = clamp(player.boostFuel + 0.005*player.mods.fuelRegen, 0, 1);
    }
    // boost whoosh on/off
    if(canBoost && !player._sfxBoost){ Sound.boostOn(); player._sfxBoost=true; }
    else if(!canBoost && player._sfxBoost){ Sound.boostOff(); player._sfxBoost=false; }
  }

  // ----- AI + 导演 -----
  updateDirector();
  for(const s of snakes){ if(s!==player && !s.dead) updateBotAI(s); }

  // ----- move -----
  for(const s of snakes){ if(!s.dead) s.update(); }

  // ----- eat -----
  for(const s of snakes){ if(!s.dead) eatOrbs(s); }

  // ----- collisions -----
  for(const s of snakes){
    if(s.dead) continue;
    const c=checkCrash(s);
    if(c){
      if(c.wall){ killSnake(s,null); }
      // 相位：玩家冲刺时蛇头可穿过他蛇身体而不死
      else if(s===player && player.mods.phase && player.boosting){ /* 穿身而过 */ }
      else { killSnake(s, c); }
    }
  }

  // ----- player death -----
  if(player && player.dead && running){ gameOver(); }

  // ----- cleanup dead bots & respawn -----
  for(let i=snakes.length-1;i>=0;i--){
    if(snakes[i].dead && snakes[i]!==player){ snakes.splice(i,1); }
  }
  while(snakes.filter(s=>!s.isPlayer).length < BOT_TARGET){ spawnBot(); }

  // ----- orb physics (迸射球的飞行 + 拾取延迟) -----
  for(const o of orbs){
    if(o.delay>0) o.delay--;
    if(o.vx||o.vy){
      o.x+=o.vx; o.y+=o.vy; o.vx*=0.9; o.vy*=0.9;
      if(Math.abs(o.vx)<0.05 && Math.abs(o.vy)<0.05){ o.vx=0; o.vy=0; }
    }
  }
  // ----- orbs upkeep -----
  if(orbs.length<ORB_TARGET && frame%3===0) fillOrbs();
  if(orbs.length>ORB_TARGET*1.6){ orbs.splice(0, orbs.length-Math.floor(ORB_TARGET*1.4)); }

  // ----- combo decay -----
  if(comboTimer>0){ comboTimer--; if(comboTimer===0) combo=0; }
  // ----- shake decay -----
  if(shake>0) shake=Math.max(0, shake-0.6);

  // ----- dynamic events -----
  updateEvents();

  // ----- 光谱进化里程碑 -----
  if(player && !player.dead && player.len >= milestoneAt(player.mutLevel)){
    player.mutLevel++;
    openEvolve();
  }

  // ----- particles -----
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94;
    p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }

  // ----- camera -----
  if(player){
    camX=lerp(camX,player.x,0.12);
    camY=lerp(camY,player.y,0.12);
    // zoom out as you grow（乘 BASE_ZOOM 扩大视野，手机更明显）
    const targetScale=clamp(1.05 - (player.radius-7)*0.012, 0.6, 1.05) * BASE_ZOOM;
    camScale=lerp(camScale,targetScale,0.04);
  }

  updateHUD();
}

// ===========================================================
//  HUD
// ===========================================================
const scoreV=document.getElementById('scoreV'),
      lenV=document.getElementById('lenV'),
      rankV=document.getElementById('rankV'),
      boardList=document.getElementById('boardList'),
      boostFill=document.getElementById('boostFill'),
      comboHud=document.getElementById('comboHud');
function playerScore(){ return Math.max(0, player.score) + bonusScore; }
function comboMult(){ return 1 + Math.min(combo*0.1, 2); }   // 展示用倍率，最高约 x3
function updateHUD(){
  if(!player) return;
  scoreV.textContent=playerScore();
  lenV.textContent=Math.floor(player.len);
  boostFill.style.width=(player.boostFuel*100)+'%';
  // combo readout
  if(combo>=3){
    comboHud.classList.add('on');
    comboHud.innerHTML=`<div class="cx">连击 ×${combo}</div><div class="cm">分数加成 ×${comboMult().toFixed(1)}</div>`;
  } else {
    comboHud.classList.remove('on');
  }
  // leaderboard (throttled)
  if(frame%8===0){
    const ranked=[...snakes].sort((a,b)=>b.len-a.len);
    const rank=ranked.indexOf(player)+1;
    rankV.textContent='#'+rank;
    let html='';
    ranked.slice(0,6).forEach((s,i)=>{
      html+=`<li class="${s===player?'me':''}"><span><span class="rk">${i+1}</span>`+
            `<span class="nm">${s===player?'你 · ':''}${s.name}</span></span>`+
            `<span>${Math.max(0,s.score)}</span></li>`;
    });
    boardList.innerHTML=html;
  }
}

// ===========================================================
//  Rendering
// ===========================================================
function render(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  drawBackground();

  ctx.save();
  // camera + 击杀震屏
  const sx = shake>0 ? rand(-shake,shake) : 0;
  const sy = shake>0 ? rand(-shake,shake) : 0;
  ctx.translate(VW/2+sx, VH/2+sy);
  ctx.scale(camScale,camScale);
  ctx.translate(-camX,-camY);

  drawGrid();
  drawArena();
  drawOrbs();
  // snakes: draw others first, player on top
  for(const s of snakes){ if(s!==player && !s.dead) drawSnake(s); }
  if(player && !player.dead) drawSnake(player);
  drawParticles();

  ctx.restore();

  drawVignette();
  drawJoystick();
  drawMinimap();
}

function drawBackground(){
  ctx.fillStyle='#04050d';
  ctx.fillRect(0,0,VW,VH);
  // 屏幕固定的柔和星云,增加层次（便宜,无 shadowBlur）
  const big=Math.max(VW,VH);
  const g1=ctx.createRadialGradient(VW*0.24,VH*0.18,0,VW*0.24,VH*0.18,big*0.62);
  g1.addColorStop(0,'rgba(70,46,128,0.20)'); g1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g1; ctx.fillRect(0,0,VW,VH);
  const g2=ctx.createRadialGradient(VW*0.82,VH*0.86,0,VW*0.82,VH*0.86,big*0.58);
  g2.addColorStop(0,'rgba(18,84,96,0.18)'); g2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g2; ctx.fillRect(0,0,VW,VH);
}

function drawVignette(){
  const g=ctx.createRadialGradient(VW/2,VH/2,Math.min(VW,VH)*0.40,VW/2,VH/2,Math.max(VW,VH)*0.72);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
}

function drawJoystick(){
  if(!(touchSteer && running)) return;
  ctx.save();
  ctx.beginPath(); ctx.arc(steerOX,steerOY,48,0,TAU);
  ctx.strokeStyle = edgeBoost?'rgba(255,178,77,0.7)':'rgba(150,170,255,0.40)';
  ctx.lineWidth=3; ctx.stroke();
  let dx=steerKX-steerOX, dy=steerKY-steerOY, d=Math.hypot(dx,dy)||1, m=Math.min(d,48);
  ctx.beginPath(); ctx.arc(steerOX+dx/d*m, steerOY+dy/d*m, 22,0,TAU);
  ctx.fillStyle = edgeBoost?'rgba(255,178,77,0.85)':'rgba(57,240,200,0.6)';
  ctx.fill();
  if(edgeBoost){ ctx.shadowColor='#ffb24d'; ctx.shadowBlur=16; ctx.fill(); }
  ctx.restore();
}

function drawGrid(){
  const view=Math.max(VW,VH)/camScale;
  const g=80;
  const x0=Math.floor((camX-view)/g)*g, x1=camX+view;
  const y0=Math.floor((camY-view)/g)*g, y1=camY+view;
  ctx.lineWidth=1;
  ctx.strokeStyle='rgba(90,110,200,0.06)';
  ctx.beginPath();
  for(let x=x0;x<x1;x+=g){ ctx.moveTo(x,y0); ctx.lineTo(x,y1); }
  for(let y=y0;y<y1;y+=g){ ctx.moveTo(x0,y); ctx.lineTo(x1,y); }
  ctx.stroke();
}

function drawArena(){
  const contracting = ev.phase==='void';
  const ringCol = contracting ? 'rgba(255,77,157,0.85)' : 'rgba(124,92,255,0.55)';
  ctx.save();
  ctx.beginPath();
  ctx.arc(0,0,arenaR,0,TAU);
  ctx.strokeStyle=ringCol;
  ctx.lineWidth=contracting?9:6;
  ctx.shadowColor=contracting?'rgba(255,77,157,0.9)':'rgba(124,92,255,0.8)';
  ctx.shadowBlur=30;
  ctx.stroke();
  // soft danger gradient just inside
  const grd=ctx.createRadialGradient(0,0,Math.max(0,arenaR-160),0,0,arenaR);
  grd.addColorStop(0,'rgba(124,92,255,0)');
  grd.addColorStop(1, contracting?'rgba(255,77,157,0.22)':'rgba(255,77,157,0.12)');
  ctx.fillStyle=grd; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(0,0,arenaR,0,TAU); ctx.fill();
  ctx.restore();
}

function drawOrbs(){
  // cull to view; 用"半透明光晕+亮芯"两个圆模拟辉光,避开昂贵的 shadowBlur
  const view=Math.max(VW,VH)/camScale*0.6+80;
  ctx.save();
  ctx.shadowBlur=0;
  for(const o of orbs){
    if(Math.abs(o.x-camX)>view||Math.abs(o.y-camY)>view) continue;
    o.pulse+=0.06;
    const pr=o.r*(1+Math.sin(o.pulse)*0.12);
    ctx.beginPath(); ctx.arc(o.x,o.y,pr*2.1,0,TAU);
    ctx.fillStyle=hexRGBA(o.color,0.14); ctx.fill();
    ctx.beginPath(); ctx.arc(o.x,o.y,pr,0,TAU);
    ctx.fillStyle=o.color; ctx.fill();
  }
  ctx.restore();
}

function drawSnake(s){
  const r=s.radius;
  const pts=s.pts;
  if(pts.length<2) return;
  // LOD：远视角或超长时隔点描边,大幅降负载（无 shadowBlur）
  const step = (camScale<0.85 || pts.length>120) ? 2 : 1;
  const heat = s.isPlayer ? Math.min(combo/30,1) : 0;   // 连击过热

  ctx.save();
  ctx.lineCap='round'; ctx.lineJoin='round'; ctx.shadowBlur=0;

  // 1) 外发光（宽、半透明）
  ctx.strokeStyle=hexRGBA(s.color, s.isPlayer?0.20:0.13);
  ctx.lineWidth=r*2 + (s.isPlayer?14:9);
  strokePath(pts,step);
  // 连击过热：额外暖色光晕
  if(heat>0.02){
    ctx.strokeStyle=hexRGBA('#ffb24d', 0.22*heat);
    ctx.lineWidth=r*2 + 16 + heat*16;
    strokePath(pts,step);
  }
  // 2) 霓虹底（亮）
  ctx.strokeStyle=s.color;
  ctx.lineWidth=r*2;
  strokePath(pts,step);
  // 3) 暗芯（盖在亮底上,留出霓虹描边,避免糊成一块）
  ctx.strokeStyle=s.dark;
  ctx.lineWidth=Math.max(2, r*2-6);
  strokePath(pts,step);
  // 4) 细高光中线
  ctx.strokeStyle=hexRGBA(s.color,0.8);
  ctx.lineWidth=Math.max(1, r*0.5);
  strokePath(pts,step);
  ctx.restore();

  // ---- head ----
  drawHead(s,r,heat);

  // ---- name ----
  ctx.save();
  ctx.font=`${Math.max(11,r*0.9)}px "Segoe UI",sans-serif`;
  ctx.textAlign='center';
  ctx.fillStyle=s.isPlayer?'#ffffff':'rgba(220,228,255,0.7)';
  ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=4;
  ctx.fillText(s.name, s.x, s.y - r - 8);
  ctx.restore();
}

function strokePath(pts,step){
  step=step||1;
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=step;i<pts.length;i+=step) ctx.lineTo(pts[i].x,pts[i].y);
  const last=pts.length-1;
  if(last%step!==0) ctx.lineTo(pts[last].x,pts[last].y);  // 保证尾点连上
  ctx.stroke();
}

function drawHead(s,r,heat){
  heat=heat||0;
  const a=s.angle;
  ctx.save();
  ctx.translate(s.x,s.y);
  ctx.rotate(a);
  // head glow circle (单圆, shadowBlur 便宜)
  ctx.beginPath(); ctx.arc(0,0,r*1.05,0,TAU);
  ctx.fillStyle=s.color;
  ctx.shadowColor = heat>0.02 ? '#ffb24d' : s.color;
  ctx.shadowBlur = (s.isPlayer?22:12) + heat*24;
  ctx.fill();
  ctx.shadowBlur=0;
  // eyes
  const ex=r*0.45, ey=r*0.55, er=r*0.42;
  for(const sgn of [-1,1]){
    ctx.beginPath(); ctx.arc(ex,sgn*ey,er,0,TAU);
    ctx.fillStyle='#fff'; ctx.fill();
    // 瞳孔朝向：玩家用鼠标(非触屏时),其余朝前
    let lookx=er*0.4, looky=0;
    if(s.isPlayer && !touchSteer){
      const wpx=camX+(pointer.x-VW/2)/camScale, wpy=camY+(pointer.y-VH/2)/camScale;
      const la=Math.atan2(wpy-s.y,wpx-s.x)-a;
      lookx=Math.cos(la)*er*0.4; looky=Math.sin(la)*er*0.4;
    }
    ctx.beginPath(); ctx.arc(ex+lookx,sgn*ey+looky,er*0.5,0,TAU);
    ctx.fillStyle='#0a0a18'; ctx.fill();
  }
  ctx.restore();
}

function drawParticles(){
  ctx.save();
  ctx.shadowBlur=0;                 // 去掉逐粒子辉光,显著降低加速/击杀时的开销
  for(const p of particles){
    ctx.globalAlpha=clamp(p.life,0,1);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,TAU);
    ctx.fillStyle=p.color;
    ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.restore();
}

// ---------- minimap ----------
function drawMinimap(){
  const W=mini.width, H=mini.height, cx=W/2, cy=H/2, R=W/2-3;
  mctx.clearRect(0,0,W,H);
  // arena disc
  mctx.beginPath(); mctx.arc(cx,cy,R,0,TAU);
  mctx.fillStyle='rgba(20,26,54,0.7)'; mctx.fill();
  mctx.strokeStyle='rgba(124,92,255,0.35)'; mctx.lineWidth=2; mctx.stroke();
  const sc=R/WORLD_R;
  // 当前(可能收缩中的)边界
  if(arenaR < WORLD_R-1){
    mctx.beginPath(); mctx.arc(cx,cy,R*arenaR/WORLD_R,0,TAU);
    mctx.strokeStyle='rgba(255,77,157,0.9)'; mctx.lineWidth=2; mctx.stroke();
  }
  // orbs (sparse)
  mctx.fillStyle='rgba(120,200,255,0.35)';
  for(let i=0;i<orbs.length;i+=12){
    const o=orbs[i];
    mctx.fillRect(cx+o.x*sc-0.5,cy+o.y*sc-0.5,1.2,1.2);
  }
  // snakes
  for(const s of snakes){
    if(s.dead) continue;
    mctx.beginPath();
    mctx.arc(cx+s.x*sc,cy+s.y*sc, s.isPlayer?3:2, 0,TAU);
    mctx.fillStyle=s.isPlayer?'#39f0c8':hexRGBA(s.color,0.85);
    mctx.fill();
  }
}

// kick off
renderMenu();
requestAnimationFrame(loop);
</script>
</body>
</html>
